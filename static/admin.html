<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#17366f">
    <title>管理画面 | 席替え投票</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body class="admin-body">
    <main class="shell admin-shell">
      <header class="site-header">
        <p class="eyebrow">ADMIN CONSOLE</p>
        <h1>席替え管理</h1>
        <p class="status">設定、投票状況、結果公開を管理します。</p>
      </header>
      <section id="notice" class="notice" hidden></section>
      <section id="login-panel" class="card login-card">
        <h2>管理者ログイン</h2>
        <form id="login-form">
          <label>パスワード<input id="password" type="password" autocomplete="current-password" required></label>
          <button class="primary" type="submit">ログイン</button>
        </form>
      </section>
      <section id="admin-app" hidden></section>
    </main>
    <script src="/static/admin.js" defer></script>
  </body>
</html>
